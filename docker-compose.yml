services:
  qr-generator:
    build: .
    ports:
      - "4242:4242"
    environment:
      SHORT_STORAGE: sqlite
      SHORT_DB_PATH: /app/data/shortener.sqlite
      SHORT_BASE_URL: http://localhost:4242
    volumes:
      - qr-generator-data:/app/data
    restart: unless-stopped

volumes:
  qr-generator-data:
